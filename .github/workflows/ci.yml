name: Teedy CI
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码（作业要求步骤）
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置Java环境（适配Teedy项目的JDK11）
      - name: 设置Java 11环境
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # 3. Maven构建（加--fail-never，避免单步失败导致整个流水线失败）
      - name: Maven构建（编译）
        run: mvn clean compile --fail-never

      - name: PMD代码检查
        run: mvn pmd:pmd --fail-never

      - name: 运行单元测试
        run: mvn test --fail-never

      - name: 生成JavaDoc文档
        run: mvn javadoc:javadoc --fail-never

      # 4. 上传构建产物（作业要求）
      - name: 上传构建结果
        uses: actions/upload-artifact@v4
        with:
          name: Teedy-构建产物
          path: target

name: Teedy CI
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 11 环境
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: 运行 Maven 构建
        run: mvn clean install -DskipTests

      - name: 运行 PMD 代码检查
        run: mvn pmd:pmd

      - name: 运行单元测试
        run: mvn test

      - name: 生成 JavaDoc 文档
        run: mvn javadoc:javadoc

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Teedy-构建结果
          path: target

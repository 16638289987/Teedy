name: Teedy CI
on:
  push:
    branches: [ master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    - name: 设置 Java 环境
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    - name: 执行 Maven 构建（编译、PMD检查、测试、生成报告）
      run: mvn clean package pmd:pmd test javadoc:javadoc
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: Teedy-构建结果
        path: target
